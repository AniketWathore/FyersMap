<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #07070e; overflow: hidden; }
    #chart { width: 100%; height: 100%; display: block; }
  </style>
  <script src="./vendor/klinecharts.min.js"></script>
</head>
<body>
  <div id="chart"></div>
  <script>
    let chart;
    let currentZoomLevel = 0.01; // Track current price precision
    
    window.onload = function() {
      // klinecharts globally loaded
      chart = klinecharts.init('chart', {
        styles: {
          grid: { 
              horizontal: { show: true, color: '#1a1a30', style: 'dashed', dashValue: [2, 2] },
              vertical: { show: true, color: '#1a1a30', style: 'dashed', dashValue: [2, 2] }
          },
          candle: {
            type: 'area', // single line as an area
            area: {
              lineSize: 2,
              lineColor: '#9999dd', 
              value: 'close',
              backgroundColor: [{
                offset: 0,
                color: 'rgba(153, 153, 221, 0.4)'
              }, {
                offset: 1,
                color: 'rgba(153, 153, 221, 0.05)'
              }]
            },
            tooltip: {
                showRule: 'always',
                showType: 'standard',
                custom: (data) => {
                    return [{
                        title: 'MID: ',
                        value: data.current.close ? data.current.close.toFixed(2) : '--'
                    }];
                }
            }
          },
          xAxis: {
            show: true,
            axisLine: { show: false },
            tickLine: { show: false },
            tickText: { color: '#505068', size: 10 }
          },
          yAxis: {
            show: true,
            position: 'right',
            axisLine: { show: false },
            tickLine: { show: false },
            tickText: { color: '#b0b0cc', size: 11 },
            type: 'normal'
          },
          crosshair: {
            show: true,
            horizontal: {
              line: { style: 'dashed', dashValue: [4, 4], color: '#707070' },
              text: { backgroundColor: '#202040', color: '#ffffff' }
            },
            vertical: {
              line: { style: 'dashed', dashValue: [4, 4], color: '#707070' },
              text: { backgroundColor: '#202040', color: '#ffffff' }
            }
          }
        }
      });
      
      // Listen for zoom/scale changes
      chart.subscribeAction('onZoom', function(params) {
        updateZoomLevel();
      });
      
      chart.subscribeAction('onScroll', function(params) {
        updateZoomLevel();
      });
    };
    
    // Handle window resize to properly scale the chart
    window.addEventListener('resize', function() {
      if (chart) {
        try {
          chart.resize();
        } catch(e) {
          console.log('Resize error:', e);
        }
      }
    });
    
    function updateZoomLevel() {
      if (!chart) return;
      // Simplified zoom level detection without using unavailable methods
      // We'll estimate based on the number of visible bars
      try {
        const visibleRange = chart.getVisibleRange();
        if (visibleRange) {
          const rangeSize = visibleRange.to - visibleRange.from;
          
          // Estimate zoom level from visible bar count
          if (rangeSize < 50) {
            currentZoomLevel = 0.01; // Fine zoom
          } else if (rangeSize < 100) {
            currentZoomLevel = 0.05;
          } else if (rangeSize < 200) {
            currentZoomLevel = 0.1;
          } else if (rangeSize < 400) {
            currentZoomLevel = 0.5;
          } else if (rangeSize < 800) {
            currentZoomLevel = 1.0;
          } else if (rangeSize < 2000) {
            currentZoomLevel = 3.0;
          } else if (rangeSize < 5000) {
            currentZoomLevel = 5.0;
          } else {
            currentZoomLevel = 10.0;
          }
        }
      } catch (e) {
        console.log('Zoom detection:', e.message);
      }
    }
    
    // update data incrementally
    function updateTick(ts, price) {
        if(!chart) return;
        const kline = {
            timestamp: ts * 1000, 
            open: price,
            close: price,
            high: price,
            low: price,
            volume: 0,
            turnover: 0
        };
        chart.updateData(kline);
    }
    
    function resetChart() {
        if(chart) {
            chart.applyNewData([]);
            currentZoomLevel = 0.01;
        }
    }
    
    // Allow Python to get current zoom level
    function getZoomLevel() {
      return currentZoomLevel;
    }
    
    // Allow Python to get visible price range
    function getVisiblePriceRange() {
      if (!chart) return { top: 0, bottom: 0 };
      try {
        const visibleRange = chart.getVisibleRange();
        return visibleRange || { top: 0, bottom: 0 };
      } catch (e) {
        return { top: 0, bottom: 0 };
      }
    }
  </script>
</body>
</html>
