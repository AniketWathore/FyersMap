<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #07070e; overflow: hidden; }
    #chart { width: 100%; height: 100%; display: block; }
  </style>
  <script src="./vendor/klinecharts.min.js"></script>
</head>
<body>
  <div id="chart"></div>
  <script>
    let chart;
    let currentZoomLevel = 0.01; // Track current price precision
    
    window.onload = function() {
      // klinecharts globally loaded
      chart = klinecharts.init('chart', {
        styles: {
          grid: { 
              horizontal: { show: true, color: '#1a1a30', style: 'dashed', dashValue: [2, 2] },
              vertical: { show: true, color: '#1a1a30', style: 'dashed', dashValue: [2, 2] }
          },
          candle: {
            type: 'area', // single line as an area
            area: {
              lineSize: 2,
              lineColor: '#9999dd', 
              value: 'close',
              backgroundColor: [{
                offset: 0,
                color: 'rgba(153, 153, 221, 0.4)'
              }, {
                offset: 1,
                color: 'rgba(153, 153, 221, 0.05)'
              }]
            },
            tooltip: {
                showRule: 'always',
                showType: 'standard',
                custom: (data) => {
                    return [{
                        title: 'MID: ',
                        value: data.current.close ? data.current.close.toFixed(2) : '--'
                    }];
                }
            }
          },
          xAxis: {
            show: true,
            axisLine: { show: false },
            tickLine: { show: false },
            tickText: { color: '#505068', size: 10 }
          },
          yAxis: {
            show: true,
            position: 'right',
            axisLine: { show: false },
            tickLine: { show: false },
            tickText: { color: '#b0b0cc', size: 11 },
            type: 'normal'
          },
          crosshair: {
            show: true,
            horizontal: {
              line: { style: 'dashed', dashValue: [4, 4], color: '#707070' },
              text: { backgroundColor: '#202040', color: '#ffffff' }
            },
            vertical: {
              line: { style: 'dashed', dashValue: [4, 4], color: '#707070' },
              text: { backgroundColor: '#202040', color: '#ffffff' }
            }
          }
        }
      });
      
      // Listen for zoom/scale changes
      chart.subscribeAction('onZoom', function(params) {
        updateZoomLevel();
      });
      
      chart.subscribeAction('onScroll', function(params) {
        updateZoomLevel();
      });
    };
    
    function updateZoomLevel() {
      if (!chart) return;
      // Get the current visible price range
      const bounding = chart.getConvertPictureCorner();
      if (bounding && bounding.top !== undefined && bounding.bottom !== undefined) {
        const priceRange = Math.abs(bounding.top - bounding.bottom);
        
        // Determine zoom level based on price range
        if (priceRange < 0.5) {
          currentZoomLevel = 0.01; // Fine: 0.01
        } else if (priceRange < 1) {
          currentZoomLevel = 0.05; // 0.05
        } else if (priceRange < 2) {
          currentZoomLevel = 0.1; // 0.1
        } else if (priceRange < 5) {
          currentZoomLevel = 0.5; // 0.5
        } else if (priceRange < 10) {
          currentZoomLevel = 1.0; // 1.0
        } else if (priceRange < 20) {
          currentZoomLevel = 3.0; // 3.0
        } else if (priceRange < 50) {
          currentZoomLevel = 5.0; // 5.0
        } else {
          currentZoomLevel = 10.0; // Coarse: 10+
        }
        
        // Notify Python about zoom change
        if (window.qt && window.qt.webChannelTransport) {
          window.pyBridge.onZoomChanged(currentZoomLevel, bounding.top, bounding.bottom);
        }
      }
    }
    
    // update data incrementally
    function updateTick(ts, price) {
        if(!chart) return;
        const kline = {
            timestamp: ts * 1000, 
            open: price,
            close: price,
            high: price,
            low: price,
            volume: 0,
            turnover: 0
        };
        chart.updateData(kline);
    }
    
    function resetChart() {
        if(chart) {
            chart.applyNewData([]);
            currentZoomLevel = 0.01;
        }
    }
    
    // Allow Python to get current zoom level
    function getZoomLevel() {
      return currentZoomLevel;
    }
    
    // Allow Python to get visible price range
    function getVisiblePriceRange() {
      if (!chart) return { top: 0, bottom: 0 };
      const bounding = chart.getConvertPictureCorner();
      return bounding || { top: 0, bottom: 0 };
    }
  </script>
</body>
</html>
